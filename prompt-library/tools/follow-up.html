<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客戶跟進助理 | AI 工具中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>👤</text></svg>">
</head>
<body>
  <div class="password-overlay" id="pw-overlay">
    <div class="password-card">
      <div class="pw-icon">🔐</div>
      <h2>AI 工具中心</h2>
      <p>此為課程學員專屬資源，請輸入課程密碼</p>
      <div class="pw-input-group">
        <input type="password" id="pw-input" placeholder="請輸入密碼" autocomplete="off">
        <button id="pw-submit">進入</button>
      </div>
      <div class="pw-error" id="pw-error"></div>
    </div>
  </div>

  <header class="site-header">
    <div class="header-left">
      <span class="header-icon">👤</span>
      <span class="header-title">客戶跟進助理</span>
    </div>
    <div class="header-right">
      <a href="../tools.html" class="badge">🛠 工具中心</a>
      <a href="../index.html" class="badge">📋 指令庫</a>
    </div>
  </header>

  <div class="tool-layout">
    <aside class="tool-sidebar">
      <a href="../tools.html" class="tool-back">← 返回工具中心</a>
      <div class="scenario-section">
        <span class="scenario-label">選擇跟進階段</span>
        <div id="scenario-list" class="scenario-list"></div>
      </div>
      <div id="form-section" class="hidden">
        <div id="tool-form" class="tool-form"></div>
        <div class="tool-actions">
          <button id="generate-btn" class="tool-generate-btn hidden">📋 產出跟進話術 Prompt</button>
        </div>
      </div>
    </aside>

    <main class="tool-main">
      <div class="tool-output-header">
        <span class="tool-output-label">即時預覽</span>
      </div>
      <div id="output-tabs" class="tool-tabs hidden"></div>
      <div id="output-content" class="tool-output-content hidden"></div>
      <div id="empty-state" class="tool-empty">
        <div class="tool-empty-icon">👤</div>
        <h3>選擇客戶跟進階段</h3>
        <p>從左側選擇階段，填入客戶資料<br>AI 幫你產出專業又不尷尬的跟進話術</p>
      </div>
      <div id="output-actions" class="tool-output-actions hidden">
        <button id="copy-btn" class="tool-copy-btn">📋 複製 Prompt</button>
      </div>
    </main>
  </div>

  <script>window.TOOL_ID = 'follow-up';</script>
  <script src="../js/tools-common.js"></script>
  <script src="../js/tool-page.js"></script>
</body>
</html>
